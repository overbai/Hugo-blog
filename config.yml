baseURL: https://baijie.me/
title: 望川
# 注意：新版本 Hugo 用 locale 替代了 languageCode
locale: zh-cn

# 核心：声明使用 PaperMod 模块
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

params:
  author: 云朵少年
  description: 欢迎来到我的博客
  # ... 你其他的配置 ...
  hasCJKLanguage: true  # <--- 加上这一行！告诉 Hugo 这里有中日韩文字
  # --- 下面是新增的配置 ---
  assets:
    favicon: "/favicon.png"        # 浏览器标签页小图标
    apple_touch_icon: "/apple-touch-icon.png"
  
  label:
    text: "望川"                    # 左上角显示的名字
    icon: "/images/avatar.png"     # 左上角头像路径 (放在 static/images/ 下)
    iconHeight: 35                 # 头像高度
  # -----------------------
  
  # 隐藏底部信息
  showPoweredBy: false
  showFooter: false
  # 功能开关
  ShowReadingTime: true
  ShowShareButtons: false
  ShowBreadCrumbs: true
  ShowWordCount: true
  UseHugoToc: true
  enableSearch: true

markup:
  goldmark:
    renderer:
      unsafe: true