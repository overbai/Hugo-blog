# 1. 网站基础地址（必须和你 Cloudflare Pages 绑定的域名一致！）
baseURL: https://baijie.me/

# 2. 网站标题
title: 望川

# 3. 语言设置（Hugo v0.158+ 用 locale 替代 languageCode）
locale: zh-cn

# 4. 声明使用的主题（⚠️ 核心：没有这行 Hugo 找不到 PaperMod！）
theme: PaperMod

# 5. 网站元数据（作者、描述）
params:
  author: 云朵少年
  description: 欢迎来到我的博客

  # 头像/图标配置（确保 static/images/ 下有 favicon.png 和 apple-touch-icon.png）
  assets:
    favicon: "/favicon.png"           # 浏览器标签页小图标
    apple_touch_icon: "/apple-touch-icon.png"  # 苹果设备图标

  # 左上角 Logo/头像配置（确保 static/images/ 下有 avatar.png）
  label:
    text: "望川"                      # 左上角显示的文字
    icon: "/images/avatar.png"        # 左上角头像路径（放在 static/images/ 下）
    iconHeight: 35                    # 头像高度（像素）

  # 底部信息隐藏（不想显示就用 false）
  showPoweredBy: false
  showFooter: false

  # 功能开关（按需开启/关闭）
  ShowReadingTime: true   # 阅读时间
  ShowShareButtons: false # 分享按钮
  ShowBreadCrumbs: true   # 面包屑导航
  ShowWordCount: true     # 字数统计
  UseHugoToc: true        # Hugo 自带目录
  enableSearch: true      # 搜索功能

# 6. 标记语言渲染（Goldmark 配置，支持 HTML 片段）
markup:
  goldmark:
    renderer:
      unsafe: true  # 允许渲染 HTML（比如代码块、自定义标签）