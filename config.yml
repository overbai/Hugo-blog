baseURL: https://baijie.me/
title: 望川
# 注意：新版本 Hugo 用 locale 替代了 languageCode
locale: zh-cn

# 核心：声明使用 PaperMod 模块
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

# 这是你原来的配置，不用动
params:
  author: 云朵少年
  description: 欢迎来到我的博客
  iconHeight: 35
  iconWidth: 35
  # 确保搜索是开启的
  search:
    enable: true 

# 👇 下面是新增的菜单配置（请直接复制这块）
menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
# -------------------------------------------------------

  # 隐藏底部信息
  showPoweredBy: false
  showFooter: false
  # 功能开关
  ShowReadingTime: true
  ShowShareButtons: false
  ShowBreadCrumbs: true
  ShowWordCount: true
  UseHugoToc: true
  enableSearch: true

markup:
  goldmark:
    renderer:
      unsafe: true