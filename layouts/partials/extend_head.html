<!-- 1. 引入霞鹜文楷字体 -->
<link rel="preconnect" href="https://fonts.loli.net">
<link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
<link href="https://fonts.loli.net/css2?family=LXGW+WenKai+Screen:wght@400;500;700&display=swap" rel="stylesheet">

<!-- 2. 终极 CSS 注入（无视一切层级） -->
<style>
    /* 强制所有正文、段落、列表使用霞鹜文楷 */
    body, p, li, div, span, article, section {
        font-family: "LXGW WenKai Screen", cursive !important;
    }

    /* 强制标题保持系统默认（防止标题也变花） */
    h1, h2, h3, h4, h5, .site-title, .page-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }
</style>
