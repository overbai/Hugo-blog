{{- if .Site.Params.hasCJKLanguage }}
    {{- $content := .Content | plainify }}
    {{- $cn := 0 }}
    {{- range (split $content "") }}
        {{- if and (ge . "一") (le . "龥") }}
            {{- $cn = add $cn 1 }}
        {{- end }}
    {{- end }}
    {{- $cn }} 字
{{- else }}
    {{ .WordCount }} words
{{- end }}
