{{ define "main" }}

<div class="articleContainer">
    <header class="hArticle--header">
        <h2 class="hArticle--headline">{{ .Title }}</h2>
        {{ if .Params.description }}
        <div class="hArticle--subline">
            {{ .Params.description }}
        </div>
        {{end}}
    </header>
    <div class="good--list">
        {{ range .Params.faves }}
        <div class="good--item">
            <div class="img-spacer">
                <img src="{{ .cover }}" alt="{{ .title }}">
            </div>
            <div class="good--name">
                <div class="brand">{{ .brand }} · {{ .cat }}</div>
                {{ .title }}
            </div>
        </div>
        {{ end }}
    </div>
    <div class="graph u-marginBottom30">
        {{ .Content }}
    </div>
</div>

{{ end }}
