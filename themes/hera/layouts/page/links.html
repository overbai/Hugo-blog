{{ define "main" }}

<div class="articleContainer">
    <div class="hArticle" data-id="{{ .File.UniqueID}}">
        <header class="hArticle--header">
            <h2 class="hArticle--headline">{{ .Title }}</h2>
            {{ if .Params.description }}
            <div class="hArticle--subline">
                {{ .Params.description }}
            </div>
            {{end}}
        </header>
        <div class="template--linksWrap">
            <div class="link-items">
                {{ range .Params.links }}
                <a class="link-item" href="{{ .link }}" title="{{ .title }}" target="_blank">
                    <strong>{{ .title }}</strong>
                    <span class="sitename">{{ .description }}</span>
                </a>
                {{ end }}
            </div>
        </div>
        <div class="grap u-marginBottom30">
            {{ .Content }}
        </div>
    </div>
</div>

{{ end }}
